services:
  backend:
    build:
      context: ./backend/go
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      GO_ENV: production
      PORT: 8085
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
    restart: unless-stopped
    networks:
      - platone_network

  frontend:
    build:
      context: ./frontend/react
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8085
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required in production}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - platone_network

networks:
  platone_network:
    driver: bridge