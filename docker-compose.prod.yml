services:
  backend:
    build:
      context: ./backend/go
      dockerfile: Dockerfile
    expose:
      - "${BACKEND_PORT:-8080}"
    environment:
      GO_ENV: production
      PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
    restart: unless-stopped
    networks:
      - platone_network

  frontend:
    build:
      context: ./frontend/react
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      NODE_ENV: production
      PORT: ${FRONTEND_PORT:-3000}
      BACKEND_URL: http://backend:${BACKEND_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required in production}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - platone_network

networks:
  platone_network:
    driver: bridge