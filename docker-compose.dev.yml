services:
  mongodb:
    image: mongo:7.0
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - platone_network

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx tsx watch server.ts"
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      NODE_ENV: development
      PORT: ${FRONTEND_PORT:-3000}
      BACKEND_URL: http://backend:${BACKEND_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:${FRONTEND_PORT:-3000}}
      DISABLE_HMR: "false"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "100"
    volumes:
      - ./frontend/react:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - platone_network
    depends_on:
      - backend

  backend:
    image: golang:1.25-alpine
    working_dir: /app
    command: sh -c "go mod tidy && go run main.go"
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    environment:
      GO_ENV: development
      PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
    depends_on:
      - mongodb
    volumes:
      - ./backend/go:/app
    restart: unless-stopped
    networks:
      - platone_network

volumes:
  frontend_node_modules:
  mongodb_data:

networks:
  platone_network:
    driver: bridge